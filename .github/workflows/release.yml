name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  check-version:
    name: Check Version and Release Status
    runs-on: ubuntu-latest
    needs: test
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      changelog: ${{ steps.check.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse CHANGELOG and check for existing release
        id: check
        run: |
          # Extract the latest version from CHANGELOG (skip Unreleased)
          VERSION=$(grep -E "^## \[[0-9]+\.[0-9]+\.[0-9]+\]" CHANGELOG.md | head -1 | sed -E 's/## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/')

          if [ -z "$VERSION" ]; then
            echo "No version found in CHANGELOG.md"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Latest version in CHANGELOG: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if release already exists
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists. Skipping."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Release v$VERSION does not exist. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT

            # Extract changelog for this version
            CHANGELOG=$(awk "/^## \[$VERSION\]/,/^## \[/{if (/^## \[/ && !/^## \[$VERSION\]/) exit; print}" CHANGELOG.md | tail -n +2)

            # Use heredoc syntax for multiline output
            {
              echo "changelog<<EOF"
              echo "$CHANGELOG"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build-tauri:
    name: Build Tauri App for macOS
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
            arch_label: 'Apple Silicon'
            runner: 'macos-15'  # ARM-based runner
          - args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
            arch_label: 'Intel'
            runner: 'macos-13'  # Intel-based runner

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Verify Certificate
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Apple Development")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported."

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri_src/target
          key: ${{ matrix.runner }}-${{ matrix.rust_target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Write Apple API key to file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p "${{ runner.temp }}/private_keys"
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > "${{ runner.temp }}/private_keys/AuthKey.p8"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
        with:
          args: ${{ matrix.args }}
          projectPath: tauri_src

      - name: Clean up Apple API key
        if: always()
        run: rm -rf "${{ runner.temp }}/private_keys"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.rust_target }}
          path: |
            tauri_src/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            tauri_src/target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [check-version, build-tauri]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release-assets

          # Find and move macOS artifacts with proper naming
          # Apple Silicon (ARM64)
          if [ -d "artifacts/macos-aarch64-apple-darwin" ]; then
            DMG=$(find artifacts/macos-aarch64-apple-darwin -name "*.dmg" -type f | head -1)
            TAR=$(find artifacts/macos-aarch64-apple-darwin -name "*.app.tar.gz" -type f | head -1)

            [ -n "$DMG" ] && mv "$DMG" "release-assets/ProveAll_${{ needs.check-version.outputs.version }}_aarch64.dmg"
            [ -n "$TAR" ] && mv "$TAR" "release-assets/ProveAll_${{ needs.check-version.outputs.version }}_aarch64.app.tar.gz"
          fi

          # Intel (x86_64)
          if [ -d "artifacts/macos-x86_64-apple-darwin" ]; then
            DMG=$(find artifacts/macos-x86_64-apple-darwin -name "*.dmg" -type f | head -1)
            TAR=$(find artifacts/macos-x86_64-apple-darwin -name "*.app.tar.gz" -type f | head -1)

            [ -n "$DMG" ] && mv "$DMG" "release-assets/ProveAll_${{ needs.check-version.outputs.version }}_x64.dmg"
            [ -n "$TAR" ] && mv "$TAR" "release-assets/ProveAll_${{ needs.check-version.outputs.version }}_x64.app.tar.gz"
          fi

          ls -la release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
          CHANGELOG: ${{ needs.check-version.outputs.changelog }}
        run: |
          # Create release with all assets
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "$CHANGELOG" \
            release-assets/*