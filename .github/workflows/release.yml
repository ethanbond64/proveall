name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  check-version:
    name: Check Version and Release Status
    runs-on: ubuntu-latest
    needs: test
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      changelog: ${{ steps.check.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse CHANGELOG and check for existing release
        id: check
        run: |
          # Extract the latest version from CHANGELOG (skip Unreleased)
          VERSION=$(grep -E "^## \[[0-9]+\.[0-9]+\.[0-9]+\]" CHANGELOG.md | head -1 | sed -E 's/## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/')

          if [ -z "$VERSION" ]; then
            echo "No version found in CHANGELOG.md"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Latest version in CHANGELOG: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if release already exists
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists. Skipping."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Release v$VERSION does not exist. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT

            # Extract changelog for this version
            CHANGELOG=$(awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { found=1; next }
              found && /^## \[/ { exit }
              found { print }
              ' CHANGELOG.md)

            # Use heredoc syntax for multiline output
            {
              echo "changelog<<EOF"
              echo "$CHANGELOG"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build-and-release:
    name: Build and Release
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    timeout-minutes: 20
    environment: Distribution
    strategy:
      fail-fast: false
      matrix:
        include:
          - args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Verify Certificate
        run: |
          echo "Searching for certificate in keychain..."

          # Get the first (and should be only) codesigning certificate
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep -E "^\s*1\)" | head -1)

          if [ -z "$CERT_INFO" ]; then
            echo "Error: No valid codesigning certificate found in keychain"
            exit 1
          fi

          # Extract the certificate name (between quotes)
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')

          if [ -z "$CERT_ID" ]; then
            echo "Error: Could not extract certificate ID"
            exit 1
          fi

          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate verified successfully"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri_src/target
          key: macos-${{ matrix.rust_target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Write Apple API key to file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p "${{ runner.temp }}/private_keys"
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > "${{ runner.temp }}/private_keys/AuthKey.p8"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          projectPath: tauri_src
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: v${{ needs.check-version.outputs.version }}
          releaseBody: ${{ needs.check-version.outputs.changelog }}

      - name: Clean up Apple API key
        if: always()
        run: rm -rf "${{ runner.temp }}/private_keys"
